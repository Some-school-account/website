<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="images/favicon.svg" />
        <link rel="stylesheet" href="styles/global.css" />
        <link rel="stylesheet" href="styles/apply.css" />
        <title>HotBeans Web</title>
    </head>
    <body>
        <nav>
            <a href="index.html">
                <img src="images/favicon.svg" alt="Hot beans Icon" />
                HotBeans
            </a>
            <a href="team.html">Team</a>
            <a href="positions.html">Positions</a>
            <a href="apply.html">Apply</a>
            <a href="courses.html">Courses</a>
        </nav>
        <main>
            <form>
                <section>
                    <label for="forename">Forename</label>
                    <input type="text" id="forename" name="forename" />
                </section>

                <section>
                    <label for="surname">Surname</label>
                    <input type="text" id="surname" name="surname" />
                </section>

                <section>
                    <label for="date">Date of birth</label>
                    <input type="date" id="date" name="date" />
                </section>

                <section>
                    <label for="address">Address</label>
                    <input type="address" id="address" name="address" />
                </section>

                <section>
                    <label for="email_address">Email Address</label>
                    <input
                        type="email"
                        id="email_address"
                        name="email_address"
                    />
                </section>

                <section>
                    <label for="phone_number">Phone Number</label>
                    <input
                        type="number"
                        id="phone_number"
                        name="phone_number"
                    />
                </section>
                <section>
                    <label for="position">Job Position</label>
                    <select id="position" name="position">
                        <option value="nil">Select a Job position</option>
                        <option value="lead">Lead developer - UK</option>
                        <option value="senior">
                            Senior web developer - UK
                        </option>
                        <option value="junior">
                            Junior web developer - UK
                        </option>
                        <option value="apprentice">
                            Apprentice web developer - UK
                        </option>
                    </select>
                </section>
                <section>
                    <label for="work_reason"
                        >Why do you want to work here?</label
                    >
                    <input type="text" id="work_reason" name="work_reason" />
                </section>
                <section>
                    <label for="work_justification"
                        >Why would you be a suitable employee</label
                    >
                    <input
                        type="text"
                        id="work_justification"
                        name="work_justification"
                    />
                </section>
                <button type="submit">Submit</button>
            </form>
        </main>
    </body>
</html>
